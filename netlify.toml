# Netlify build & deploy config for Advantage Heating & Air Conditioning

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# next.config.ts already sets `output: "export"` so the build emits a static
# site to /out. The contact form (see ContactForm.tsx) is rendered server-side
# on every page above the footer, so Netlify detects the `name="contact"` form
# automatically during the deploy scan — no separate __forms.html needed.

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
